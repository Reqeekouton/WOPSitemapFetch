name: Fetch and Fix WOP Sitemap

on:
  schedule:
    - cron: '0 3 * * *'   # 每天凌晨3点运行
  workflow_dispatch:       # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 抓取 Wikidot 的 sitemap.xml
        run: |
          curl -L -o raw.txt \
            https://write-on-paper.wikidot.com/sitemap.xml
          echo "✅ 原始文件已下载"
      
      - name: 提取 XML 内容并转换为 TXT 格式
        run: |
          # 提取 XML 部分并转换为纯文本（提取 URL）
          sed -n '/<?xml/,/<\/urlset>/p' raw.txt > temp.xml
          
          if ! grep -q "</urlset>" temp.xml; then
            echo "❌ XML 提取失败"
            exit 1
          fi
          
          # 从 XML 中提取所有 <loc> 标签内的 URL，并转换为 https
          grep -o '<loc>[^<]*</loc>' temp.xml | \
            sed 's/<loc>//;s/<\/loc>//' | \
            sed 's|http://write-on-paper.wikidot.com|https://write-on-paper.wikidot.com|g' \
            > new-urls.txt
          
          # 排序并去重
          sort -u new-urls.txt -o new-urls.txt
          
          echo "✅ 已提取 $(wc -l < new-urls.txt) 个 URL"
          rm -f temp.xml raw.txt
      
      - name: 提取新增内容（仅在已有文件时）
        id: compare
        run: |
          if [ -f "sitemap.txt" ]; then
            # 找出新文件中有但旧文件中没有的行
            comm -23 new-urls.txt sitemap.txt > incremental.txt
            
            COUNT=$(wc -l < incremental.txt)
            if [ "$COUNT" -gt 0 ]; then
              echo "🆕 发现 $COUNT 条新内容"
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "count=$COUNT" >> $GITHUB_OUTPUT
            else
              echo "📭 无新增内容，跳过更新"
              echo "changed=false" >> $GITHUB_OUTPUT
              rm -f new-urls.txt incremental.txt
            fi
          else
            echo "🆕 首次运行，创建完整文件"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "首次运行" >> $GITHUB_OUTPUT
            # 首次运行时，所有内容都是新增的
            cp new-urls.txt incremental.txt
          fi
      
      - name: 更新主文件（当有新增内容时）
        if: steps.compare.outputs.changed == 'true'
        run: |
          DATE=$(date +'%Y%m%d')
          
          # 归档旧版本
          if [ -f "sitemap.txt" ]; then
            mkdir -p archive
            cp sitemap.txt "archive/${DATE}sitemap.txt"
            echo "📦 旧版本已归档为 archive/${DATE}sitemap.txt"
          fi
          
          # 将新增内容追加到主文件
          cat incremental.txt >> sitemap.txt
          
          # 去重并排序
          sort -u sitemap.txt -o sitemap.txt
          
          NEW_COUNT=$(wc -l < sitemap.txt)
          echo "✅ 已更新，当前共 $NEW_COUNT 条 URL"
          
          # 记录本次新增内容到单独文件
          mkdir -p changes
          cat incremental.txt > "changes/${DATE}_新增.txt"
          echo "📝 新增内容已保存至 changes/${DATE}_新增.txt"
      
      - name: 删除超过30天的归档文件
        if: steps.compare.outputs.changed == 'true'
        run: |
          find archive/ -name "*.txt" -type f -mtime +30 -delete
          find changes/ -name "*.txt" -type f -mtime +30 -delete
          COUNT=$(find archive/ -name "*.txt" | wc -l)
          echo "📁 当前归档文件数量: $COUNT"
      
      - name: 提交并推送更改
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.txt archive/ changes/
          git commit -m "新增 ${{ steps.compare.outputs.count }} 条URL - $(date '+%Y-%m-%d %H:%M:%S')" || echo "无变化"
          git push
      
      - name: 无变化时输出提示并清理
        if: steps.compare.outputs.changed == 'false'
        run: |
          echo "📭 与上次相比无新增 URL"
          rm -f new-urls.txt incremental.txt raw.txt
